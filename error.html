<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Error</title>
    <link rel="stylesheet" href="style.css?v=8"></link>
    <style>
        #error-prompt {
            display: flex;
            justify-content: center;
            font-size: clamp(2.2rem, 6vw, 3.4rem);
            margin-top: 2rem;
            margin-bottom: 2rem;
            color: var(--aqua);
        }

        #error-details {
            display: block;
            width: 90%;
            max-width: 720px;
            margin: 0 auto 1.5rem;
            text-align: center;
            color: var(--fg);
            opacity: 0.9;
            word-break: break-word;
        }

        #error-redirect {
            display: block;
            margin: 1rem auto 0;
            padding: 0.6rem 1.2rem;
        }
    </style>
</head>
<body>
    <h1 id="error-prompt">Error</h1>
    <p id="error-details">Connection to chat thing was lost.</p>
    <button id="error-redirect" type="button">Back</button>
    <script>
      const params = new URLSearchParams(window.location.search);
      const details = params.get("msg");
      if (details) {
        document.getElementById("error-details").textContent = details;
      }

      document.getElementById("error-redirect").addEventListener("click", () => {
        window.location.href = `/name.html?v=${Date.now()}`;
      });
    </script>
</body>
</html>
