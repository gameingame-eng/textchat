<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Name</title>
    <link rel="stylesheet" href="style.css?v=8"></link>
    <style>
        #name-prompt {
            display: flex;
            justify-content: center;
            font-size: clamp(2.4rem, 7vw, 3.8rem);
            margin-top: 2rem;
            margin-bottom: 8rem;
        }

        #name-input {
            display: block;
            flex-shrink: 0;
            width: 50%;
            margin: 0 auto 2rem;
            background-color: var(--bg3);
            border: 2px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            outline: none;
            font-size: 15px;
        }

        #color-picker-wrap {
            width: min(22rem, 90%);
            margin: 0 auto 1.5rem;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            background-color: var(--bg2);
            text-align: center;
        }

        #color-picker-wrap label {
            display: block;
            margin-bottom: 0.8rem;
            color: var(--aqua);
            font-weight: bold;
        }

        #color-input {
            width: 5rem;
            height: 3rem;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        #color-preview {
            margin-top: 0.8rem;
            font-weight: bold;
        }

        #name-submit {
            display: block;
            margin: 1rem auto 0;
            padding: 0.6rem 1.2rem;
        }

        #name-error {
            text-align: center;
            color: #e67e80;
            min-height: 1.25rem;
            margin-top: 0.5rem;
            font-weight: bold;
        }

        #bottom-placeholder {
            position: fixed;
            bottom: 0.75rem;
            left: 0;
            width: 100%;
            text-align: center;
            opacity: 0.5;
            color: var(--border);
            font-size: 0.9rem;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            #name-input {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <h1 id="name-prompt">Enter Name</h1>
    <input type="text" id="name-input" maxlength="24" placeholder="Name">
    <div id="color-picker-wrap">
        <label for="color-input">Choose Your Color</label>
        <input type="color" id="color-input" value="#83c092">
        <p id="color-preview">Preview Name</p>
    </div>
    <button id="name-submit" type="button" disabled>Submit</button>
    <p id="name-error"></p>
    <p id="bottom-placeholder">placeholder</p>
    <script>
      const namePrompt = document.getElementById("name-prompt");
      const promptColors = ["--green", "--aqua", "--fg"];
      const randomColorVar = promptColors[Math.floor(Math.random() * promptColors.length)];
      namePrompt.style.color = `var(${randomColorVar})`;

      const nameInput = document.querySelector("#name-input");
      const colorInput = document.querySelector("#color-input");
      const colorPreview = document.querySelector("#color-preview");
      const nameSubmit = document.querySelector("#name-submit");
      const nameError = document.querySelector("#name-error");
      const defaultColor = "#83c092";

      function updateColorPreview() {
        colorPreview.style.color = colorInput.value;
        colorPreview.textContent = nameInput.value.trim() || "Preview Name";
      }

      function isValidName(name) {
        return name.length > 0;
      }

      function updateSubmitState() {
        nameSubmit.disabled = !isValidName(nameInput.value);
      }

      const oldName = localStorage.getItem("chat_name");
      if (oldName !== null) {
        nameInput.value = oldName;
      }

      const oldColor = localStorage.getItem("chat_color");
      if (oldColor !== null && /^#[0-9a-fA-F]{6}$/.test(oldColor)) {
        colorInput.value = oldColor;
      } else {
        colorInput.value = defaultColor;
      }

      function submitName() {
        const name = nameInput.value;
        if (!isValidName(name)) {
          nameError.textContent = "Enter a name.";
          nameInput.focus();
          return;
        }
        nameError.textContent = "";
        localStorage.setItem("chat_name", name);
        localStorage.setItem("chat_color", colorInput.value);
        window.location.href = `/index.html?v=${Date.now()}`;
      }

      nameInput.addEventListener("input", () => {
        nameError.textContent = "";
        updateSubmitState();
        updateColorPreview();
      });

      colorInput.addEventListener("input", updateColorPreview);

      nameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          submitName();
        }
      });

      nameSubmit.addEventListener("click", submitName);
      updateSubmitState();
      updateColorPreview();
    </script>
</body>
</html>
